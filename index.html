<!DOCTYPE html>
<html>
<head>
    <title>TDA Beyin Ağı Karşılaştırması</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); font-family: 'Segoe UI', sans-serif; }
        .label {
            position: absolute; text-align: center; width: 33.3%; bottom: 40px;
            color: #ffffff; text-shadow: 0 0 10px rgba(0,255,255,0.7);
            font-size: 14px; letter-spacing: 1px; pointer-events: none;
        }
        .label b { font-size: 18px; display: block; margin-bottom: 5px; color: #00d4ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div style="position:relative; width:100%; height:100vh;">
        <div class="label" style="left: 0;"><b>1. SAĞLIKLI BEYİN</b>(Yüksek Boyutlu Geometri)</div>
        <div class="label" style="left: 33.3%;"><b>2. ALZHEIMER MODELİ</b>(Rastgele Parçalanma)</div>
        <div class="label" style="left: 66.6%;"><b>3. D.S. SENDROMU MODELİ</b>(Sınırlı Geometrik Yapılar)</div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 50); // Görseldeki gibi geniş açı

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- IŞIKLANDIRMA (Görseldeki parlamalar için) ---
        const mainLight = new THREE.PointLight(0xffffff, 2.5, 200);
        mainLight.position.set(0, 20, 30);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0x404040, 1.2));

        const nodeGeo = new THREE.SphereGeometry(0.3, 24, 24);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.35, transparent: true });

        // --- 1. SAĞLIKLI BEYİN (YÜKSEK YOĞUNLUK) ---
        function createHealthy(offset) {
            const group = new THREE.Group();
            const nodes = [];
            const mat = new THREE.MeshPhongMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 0.7 });
            
            for(let i=0; i<60; i++) { // Nokta sayısı artırıldı
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
                group.add(n); nodes.push(n);
            }
            nodes.forEach((n1, i) => {
                nodes.slice(i+1).forEach(n2 => {
                    if(n1.position.distanceTo(n2.position) < 7) { // Daha fazla bağlantı
                        const g = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                        group.add(new THREE.Line(g, lineMat));
                    }
                });
            });
            group.position.x = offset; scene.add(group); return group;
        }

        // --- 2. ALZHEIMER (GÖRSELDEKİ C-FORMU VE PARÇALANMIŞ YAPI) ---
        function createAlzheimer(offset) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0xff0000, emissiveIntensity: 0.7 });
            const nodes = [];
            
            for(let i=0; i<25; i++) {
                const angle = (i / 25) * Math.PI * 1.5; // C-şekli oluşturur
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set(
                    Math.cos(angle) * 6 + (Math.random()-0.5)*2,
                    Math.sin(angle) * 6 + (Math.random()-0.5)*2,
                    (Math.random()-0.5)*4
                );
                nodes.push(n);
            }
            nodes.forEach((n, i) => {
                let connected = false;
                for(let j=0; j<nodes.length; j++) {
                    if(i !== j && nodes[i].position.distanceTo(nodes[j].position) < 5 && Math.random() < 0.2) {
                        const g = new THREE.BufferGeometry().setFromPoints([n.position, nodes[j].position]);
                        group.add(new THREE.Line(g, lineMat));
                        connected = true;
                    }
                }
                if(connected) group.add(n); // Sadece bağlantısı olanları ekle (Image 14'teki gibi)
            });
            group.position.x = offset; scene.add(group); return group;
        }

        // --- 3. DOWN SENDROMU (4 AYRI DAİRESEL KLİK) ---
        function createDS(offset) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.8 });
            const centers = [{x:-4, y:4}, {x:4, y:4}, {x:-4, y:-4}, {x:4, y:-4}];

            centers.forEach(center => {
                const cliqueNodes = [];
                for(let i=0; i<10; i++) {
                    const n = new THREE.Mesh(nodeGeo, mat);
                    const angle = (i / 10) * Math.PI * 2;
                    n.position.set(
                        center.x + Math.cos(angle) * 3,
                        center.y + Math.sin(angle) * 3,
                        (Math.random()-0.5)*2
                    );
                    group.add(n); cliqueNodes.push(n);
                }
                cliqueNodes.forEach((n1, i) => {
                    cliqueNodes.slice(i+1).forEach(n2 => {
                        const g = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                        group.add(new THREE.Line(g, lineMat));
                    });
                });
            });
            group.position.x = offset; scene.add(group); return group;
        }

        const h = createHealthy(-20);
        const a = createAlzheimer(0);
        const ds = createDS(20);

        function animate() {
            requestAnimationFrame(animate);
            h.rotation.y += 0.002;
            a.rotation.y += 0.001;
            ds.rotation.y += 0.0015;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
