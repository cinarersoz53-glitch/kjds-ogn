<!DOCTYPE html>
<html>
<head>
    <title>TDA Beyin Ağı Karşılaştırması</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
        .label {
            position: absolute; text-align: center; width: 33.3%; bottom: 40px;
            color: #ffffff; text-shadow: 0 0 10px rgba(0,255,255,0.7);
            font-size: 14px; letter-spacing: 1px; pointer-events: none;
        }
        .label b { font-size: 18px; display: block; margin-bottom: 5px; color: #00d4ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div style="position:relative; width:100%; height:100vh;">
        <div class="label" style="left: 0;"><b>1. SAĞLIKLI BEYİN</b>(Yüksek Boyutlu Geometri)</div>
        <div class="label" style="left: 33.3%;"><b>2. ALZHEIMER MODELİ</b>(Rastgele Parçalanma)</div>
        <div class="label" style="left: 66.6%;"><b>3. D.S. SENDROMU MODELİ</b>(Sınırlı Geometrik Yapılar)</div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 45); // Tüm yapıları görmek için ideal uzaklık

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Işıklandırma
        const light = new THREE.PointLight(0xffffff, 2, 200);
        light.position.set(0, 10, 30);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        const nodeGeo = new THREE.SphereGeometry(0.25, 24, 24);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true });

        // --- 1. SAĞLIKLI (YEŞİL) ---
        function createHealthy(offset) {
            const group = new THREE.Group();
            const nodes = [];
            const mat = new THREE.MeshPhongMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 0.5 });
            for(let i=0; i<35; i++) {
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set((Math.random()-0.5)*12, (Math.random()-0.5)*12, (Math.random()-0.5)*12);
                group.add(n); nodes.push(n);
            }
            for(let i=0; i<nodes.length; i++) {
                for(let j=i+1; j<nodes.length; j++) {
                    if(nodes[i].position.distanceTo(nodes[j].position) < 6 && Math.random() < 0.4) {
                        const g = new THREE.BufferGeometry().setFromPoints([nodes[i].position, nodes[j].position]);
                        group.add(new THREE.Line(g, lineMat));
                    }
                }
            }
            group.position.x = offset; scene.add(group); return group;
        }

        // --- 2. ALZHEIMER (KIRMIZI - Bağlantısız nokta yok) ---
        function createAlzheimer(offset) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0xff0000, emissiveIntensity: 0.5 });
            const nodes = [];
            for(let i=0; i<15; i++) {
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set((Math.random()-0.5)*12, (Math.random()-0.5)*12, (Math.random()-0.5)*12);
                nodes.push(n);
            }
            // Sadece bağlantısı olanları sahneye ekle
            nodes.forEach((n, i) => {
                let connected = false;
                for(let j=0; j<nodes.length; j++) {
                    if(i !== j && Math.random() < 0.08) {
                        const g = new THREE.BufferGeometry().setFromPoints([n.position, nodes[j].position]);
                        group.add(new THREE.Line(g, lineMat));
                        connected = true;
                    }
                }
                if(connected) group.add(n); // Sadece bir yere bağlanan kırmızıları ekle
            });
            group.position.x = offset; scene.add(group); return group;
        }

        // --- 3. DOWN SENDROMU (SARI - 4 Daire Bölüm) ---
        function createDS(offset) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.6 });
            const centers = [
                {x: -3, y: 3}, {x: 3, y: 3},
                {x: -3, y: -3}, {x: 3, y: -3}
            ];

            centers.forEach(center => {
                const cliqueNodes = [];
                for(let i=0; i<8; i++) {
                    const n = new THREE.Mesh(nodeGeo, mat);
                    const angle = (i / 8) * Math.PI * 2;
                    n.position.set(
                        center.x + Math.cos(angle) * 2.5,
                        center.y + Math.sin(angle) * 2.5,
                        (Math.random()-0.5) * 2
                    );
                    group.add(n);
                    cliqueNodes.push(n);
                }
                // Daire içindeki her noktayı birbirine bağla (Klik yapısı)
                for(let i=0; i<cliqueNodes.length; i++) {
                    for(let j=i+1; j<cliqueNodes.length; j++) {
                        const g = new THREE.BufferGeometry().setFromPoints([cliqueNodes[i].position, cliqueNodes[j].position]);
                        group.add(new THREE.Line(g, lineMat));
                    }
                }
            });
            group.position.x = offset; scene.add(group); return group;
        }

        const g1 = createHealthy(-16);
        const g2 = createAlzheimer(0);
        const g3 = createDS(16);

        function animate() {
            requestAnimationFrame(animate);
            g1.rotation.y += 0.003;
            g2.rotation.y += 0.001;
            g3.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
